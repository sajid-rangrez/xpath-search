<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML XPath Web Toolkit</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        /* CSS Variables for Light Mode (Default) */
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333333;
            --card-bg: #ffffff;
            --heading-color: #2c3e50;
            --border-color: #eaeded;
            --input-border: #ccc;
            --bulk-box-bg: #ebf5fb;
            --bulk-box-border: #aed6f1;
            --bulk-box-text: #2e4053;
            --table-header-bg: #f8f9fa;
            --table-hover: #f1f4f6;
            --toggle-btn-bg: #2c3e50;
            --toggle-btn-text: #ffffff;
            --btn-danger: #e74c3c;
        }

        /* CSS Variables for Dark Mode */
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --heading-color: #ecf0f1;
            --border-color: #2c3e50;
            --input-border: #444444;
            --bulk-box-bg: #1a252f;
            --bulk-box-border: #2c3e50;
            --bulk-box-text: #aed6f1;
            --table-header-bg: #2d2d2d;
            --table-hover: #2a2a2a;
            --toggle-btn-bg: #f1c40f;
            --toggle-btn-text: #121212;
            --btn-danger: #c0392b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
            transition: background 0.3s, color 0.3s;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
        }

        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: background 0.3s; }
        h1 { margin: 0; color: var(--heading-color); }
        h2 { margin-top: 0; color: var(--heading-color); border-bottom: 2px solid var(--border-color); padding-bottom: 8px;}
        
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid var(--input-border); background: var(--bg-color); color: var(--text-color); border-radius: 4px; box-sizing: border-box; resize: vertical; font-family: monospace; }
        .form-group { margin-bottom: 15px; }
        
        /* Updated Grid to support 3 columns: Key, XPath, and Delete Button */
        .xpath-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; border: 1px solid var(--input-border); background: var(--bg-color); color: var(--text-color); border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; text-decoration: none; display: inline-block; text-align: center;}
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-secondary { background: #95a5a6; color: white; margin-top: 5px; }
        .btn-del { background: var(--btn-danger); color: white; padding: 8px 12px; }
        
        .btn-toggle {
            background: var(--toggle-btn-bg);
            color: var(--toggle-btn-text);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .alert { padding: 12px; border-radius: 4px; font-weight: bold; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .table-container { overflow-x: auto; max-height: 500px; border: 1px solid var(--border-color); border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background: var(--table-header-bg); position: sticky; top: 0; color: var(--heading-color); }
        tr:hover { background: var(--table-hover); }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>XPath Search</h1>
        <button type="button" class="btn btn-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <form id="xpathForm" hx-post="/process" hx-encoding="multipart/form-data" hx-target="#resultView" class="container">
        
        <div class="card">
            <h2>Data Source Input (XML)</h2>
            <div class="form-group">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Upload XML File:</label>
                <input type="file" name="xml_file" accept=".xml">
            </div>
            <div class="form-group">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Or Paste XML Content:</label>
                <textarea name="xml_text" placeholder="<xml> paste data here... </xml>"></textarea>
            </div>

            <h2>Configure Path Mappings</h2>
            <div class="form-group" style="background: var(--bulk-box-bg); padding: 12px; border-radius: 6px; border: 1px solid var(--bulk-box-border); color: var(--bulk-box-text);">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Bulk Load XPaths from CSV:</label>
                <input type="file" id="configCsv" accept=".csv" onchange="loadConfigCSV(this)">
                <small style="display:block; margin-top:4px; opacity: 0.85;">Upload a CSV where Column A = Key Name, Column B = XPath Expression</small>
            </div>

            <div id="xpathContainer" style="margin-top: 15px;">
                <div class="xpath-row">
                    <input type="text" name="keys[]" placeholder="Key Name (e.g., BookTitle)" required>
                    <input type="text" name="xpaths[]" placeholder="XPath Query (e.g., //title/text())" required>
                    <button type="button" class="btn btn-del" onclick="deleteRow(this)">❌</button>
                </div>
            </div>
            <button type="button" class="btn btn-secondary" onclick="addNewRow('', '')">➕ Add Mapping Row</button>
            
            <div style="margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 15px;">
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px;">Search</button>
            </div>
        </div>

        <div class="card">
            <h2>Results</h2>
            <div id="resultView">
                <p style="color: #7f8c8d; font-style: italic;">Provide data and map settings to generate row extractions...</p>
            </div>
        </div>
    </form>

    <script>
        const activeTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', activeTheme);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        }

        // Appends a new input row with an integrated delete button
        function addNewRow(key = '', xpath = '') {
            const container = document.getElementById('xpathContainer');
            const div = document.createElement('div');
            div.className = 'xpath-row';
            div.innerHTML = `
                <input type="text" name="keys[]" placeholder="Key Name" value="${key}" required>
                <input type="text" name="xpaths[]" placeholder="XPath Query" value="${xpath}" required>
                <button type="button" class="btn btn-del" onclick="deleteRow(this)">❌</button>
            `;
            container.appendChild(div);
        }

        // Deletes the corresponding configuration row
        function deleteRow(button) {
            const container = document.getElementById('xpathContainer');
            // Prevent removing the absolute last remaining row to keep the form valid
            if (container.children.length > 1) {
                button.parentElement.remove();
            } else {
                alert("You must keep at least one mapping configuration row.");
            }
        }

        function loadConfigCSV(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                const container = document.getElementById('xpathContainer');
                
                container.innerHTML = '';

                lines.forEach(line => {
                    if (!line.trim()) return;
                    
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        const key = parts[0].replace(/^["']|["']$/g, '').trim();
                        const xpath = parts[1].replace(/^["']|["']$/g, '').trim();
                        if(key || xpath) {
                            addNewRow(key, xpath);
                        }
                    }
                });
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
